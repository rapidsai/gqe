syntax = "proto3";

package gqe.proto;

import "physical_plan.proto";
import "statistics.proto";
import "storage.proto";
import "uuid.proto";

message SessionOptionValue {
  oneof option_value {
    string string_value = 1;
    bool   bool_value   = 2;
    int64  int64_value  = 3;
    double double_value = 4;
  }
}

message OptimizationParameters {
  map<string, SessionOptionValue> options = 1;
}

// Service exposed by each task manager, called by the node manager.
service TaskManagerService {
  rpc ExecutePlan(ExecutePlanRequest) returns (ExecutePlanResponse) {}
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse) {}
  rpc GenerateNvshmemUid(GenerateUidRequest) returns (GenerateUidResponse) {}
  rpc InitNvshmem(InitNvshmemRequest) returns (InitNvshmemResponse) {}
  rpc SetPeerInfo(SetPeerInfoRequest) returns (SetPeerInfoResponse) {}
}

message ExecutePlanRequest {
  PhysicalRelation      physical_plan           = 1;
  Uuid                  query_id                = 2;
  repeated StorageDescriptor table_catalog      = 3;
  OptimizationParameters optimization_parameters = 4;
}

message ExecutePlanResponse {
  bytes arrow_ipc_result = 1;
  string error_message = 2;
  bool success = 3;
  int32 rank = 4;
  TableStatistics write_statistics = 5;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  int32 rank = 2;
}

message GenerateUidRequest {}
message GenerateUidResponse { bytes unique_id = 1; }

message InitNvshmemRequest {
  bytes unique_id = 1;    // 128-byte nvshmemx_uniqueid_t
  int32 rank = 2;
  int32 num_ranks = 3;
}
message InitNvshmemResponse {
  bool success = 1;
  string error_message = 2;
  fixed64 pgas_base_ptr = 3;
  string grpc_address = 4;    // task migration gRPC address
}

message PeerInfo {
  int32 rank = 1;
  fixed64 pgas_base_ptr = 2;
  string grpc_address = 3;
}
message SetPeerInfoRequest { repeated PeerInfo peers = 1; }
message SetPeerInfoResponse { bool success = 1; }
