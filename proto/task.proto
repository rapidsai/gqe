syntax = "proto3";

package proto;

import "result.proto";

service TaskMigration {
    rpc FetchTaskMetadata(TaskId) returns (TaskMetadata) {}
}

enum TaskStatus {
    // Task has not been started on the current GPU.
    not_started = 0;
    // Task is currently executing on or migrating to the current GPU.
    in_progress = 1;
    // Task result is available to the current GPU.
    finished = 2;
    // Task has failed execution.
    failed = 3;
}

message TaskId {
    string id = 1;
}

message TaskMetadata {
    TaskId id = 1; // We only need the task id for now since this is unique in a task graph
    TaskStatus status = 2;
    Result result = 3;
}

