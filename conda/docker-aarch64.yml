name: gqe
channels:
  - rapidsai
  - conda-forge
  - nvidia
dependencies:
  - libnuma
  - numactl
  - rust
  - python=3.12
  - cuda-cccl
  - cuda-cudart
  - cuda-cudart-dev
  - cuda-nvcc
  - cuda-nvrtc-dev
  - cuda-nvtx-dev
  - cuda-version=12.8
  - cmake
  - c-compiler
  - cxx-compiler
  - clang-tools=11.1.0
  - gcc_linux-aarch64=11.*
  - sysroot_linux-aarch64==2.17
  - libprotobuf=4.*
  - pandas
  - pyarrow=16.1.0
  - pybind11=2.13.6
  - thrift-compiler=0.19
  - libthrift=0.19
  - zlib  # libthrift checks zlib during CMake configuration, but conda-forge doesn't install it automatically
  - nvcomp=4.1.0
  - liburing
