name: gqe
channels:
  - rapidsai
  - nvidia
  - conda-forge
dependencies:
  - libcudf=24.04
  - libnuma
  - python=3.10
  - cuda-cccl=12.2
  - cuda-cudart=12.2
  - cuda-cudart-static  # nvidia channel CUDA misses this dependency, so added manually
  - cuda-cudart-dev=12.2
  - cuda-nvcc=12.2
  - cuda-version=12.2
  - cmake
  - c-compiler
  - cxx-compiler
  - clang-tools=11.1.0
  - gcc_linux-64=11.*
  - sysroot_linux-64==2.17
  - libprotobuf=4.*
  - pandas
  - pyarrow
  - thrift-compiler
  - libthrift
  - zlib  # libthrift checks zlib during CMake configuration, but conda-forge doesn't install it automatically
  - nvcomp
