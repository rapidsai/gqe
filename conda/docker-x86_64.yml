name: gqe
channels:
  - rapidsai
  - conda-forge
  - nvidia
dependencies:
  - libxml2<2.14
  - libnuma
  - numactl
  - rust
  - python=3.12
  - cuda-cccl
  - cuda-cudart
  - cuda-cudart-dev
  - cuda-nvcc
  - cuda-nvrtc-dev
  - cuda-nvtx-dev
  - cuda-version=12.9
  - cuda-command-line-tools
  - cmake
  - c-compiler
  - cxx-compiler
  - clang-tools=20.1.4
  - gcc_linux-64=11.*
  - sysroot_linux-64==2.28
  - libprotobuf=4.*
  - pandas
  - pyarrow=16.1.0
  - pybind11=2.13.6
  - thrift-compiler=0.19
  - libthrift=0.19
  - zlib  # libthrift checks zlib during CMake configuration, but conda-forge doesn't install it automatically
  - nvcomp=4.1.0
  - liburing
  - libnvshmem-static==3.2.5
  - spdlog=1.15.3
  - fmt=11.1.4