syntax = "proto3";

package gqe.proto;

import "result.proto";

// A cudf::data_type. For most types, only type_id is set. Decimal types
// additionally carry a scale.
message DataType {
  .proto.DataType type_id = 1;
  oneof precision {
    int32 scale = 2;  // Only set for DECIMAL32, DECIMAL64, DECIMAL128.
  }
}
