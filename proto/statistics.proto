syntax = "proto3";

package gqe.proto;

// Mirrors gqe::fixed_width_compression_statistics.
message FixedWidthCompressionStatistics {
  uint64 num_compressed_row_groups = 1;
  int64 compressed_size = 2;
  int64 uncompressed_size = 3;
  int64 primary_compressed_size = 4;
  int64 secondary_compressed_size = 5;
  uint64 num_primary_compressed_row_groups = 6;
  uint64 num_secondary_compressed_row_groups = 7;
}

// Mirrors gqe::string_compression_statistics.
message StringCompressionStatistics {
  FixedWidthCompressionStatistics offsets_stats = 1;
  FixedWidthCompressionStatistics chars_stats = 2;
}

// Mirrors gqe::column_compression_statistics (variant).
message ColumnCompressionStatistics {
  oneof stats {
    FixedWidthCompressionStatistics fixed_width = 1;
    StringCompressionStatistics string = 2;
  }
}

// Mirrors gqe::column_statistics.
message ColumnStatistics {
  uint64 column_id = 1;
  ColumnCompressionStatistics compression_stats = 2;
}

// Mirrors gqe::table_statistics.
message TableStatistics {
  int64 num_rows = 1;
  uint64 num_row_groups = 2;
  uint64 num_columns = 3;
  repeated ColumnStatistics column_stats = 4;
}
