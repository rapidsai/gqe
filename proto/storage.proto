syntax = "proto3";

package gqe.proto;

// Only shared memory and file-based storage kinds are supported for
// multi-process execution. Process-local storage kinds are not supported.

import "data_type.proto";

message BoostSharedMemoryStorage {}
message SharedNumaPoolMemoryStorage { int32 numa_node_id = 1; }
message ParquetFileStorage { repeated string file_paths = 1; }

message StorageDescriptor {
  // Common metadata for shared-memory storage kinds.
  string table_name = 1;
  repeated string column_names = 2;
  repeated DataType data_types = 3;

  oneof storage {
    BoostSharedMemoryStorage boost_shared_memory = 4;
    SharedNumaPoolMemoryStorage shared_numa_pool_memory = 5;
    ParquetFileStorage parquet_file = 6;
  }
}
